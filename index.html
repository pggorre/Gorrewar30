<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0C1829">
<meta name="description" content="WAR30 — GORRÉ">
<title>WAR30 — GORRÉ</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230C1829'/%3E%3Ctext x='32' y='46' font-family='Arial Black,sans-serif' font-size='40' font-weight='900' fill='%23B89050' text-anchor='middle'%3EG%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700;800&family=Barlow+Semi+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0C1829;
    --navy-2:#0A0F1C;
    --obsidian:#0A0B0D;
    --panel:#101E33;
    --panel-2:#142544;
    --gold:#B89050;
    --gold-bright:#D8B87A;
    --ivory:#EDE8DF;
    --ivory-dim:#A9B0BC;
    --line:rgba(184,144,80,.22);
    --line-soft:rgba(237,232,223,.10);
    --maxw:1180px;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:
      radial-gradient(1200px 600px at 50% -200px, rgba(184,144,80,.10), transparent 60%),
      linear-gradient(180deg, #0A0F1C 0%, #0C1829 30%, #0A1322 100%);
    background-attachment:fixed;
    color:var(--ivory);
    font-family:'Barlow',system-ui,sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  ::selection{background:var(--gold);color:var(--navy)}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
  .eyebrow{
    font-family:'Barlow Semi Condensed',sans-serif;
    font-weight:600;font-size:12px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--gold);display:inline-flex;align-items:center;gap:12px;
  }
  .eyebrow::before{content:"";width:28px;height:1px;background:var(--gold);opacity:.7}
  h1,h2,h3{font-family:'Bebas Neue',sans-serif;font-weight:400;letter-spacing:.01em;line-height:.96;color:var(--ivory)}
  .display{font-size:clamp(64px,17vw,200px)}
  .h2{font-size:clamp(38px,6vw,72px)}
  .h3{font-size:clamp(26px,3.6vw,40px)}
  .lede{font-size:clamp(16px,2.1vw,19px);color:var(--ivory-dim);max-width:60ch}
  .gold{color:var(--gold)}

  /* ---------- NAV ---------- */
  nav{
    position:sticky;top:0;z-index:60;
    backdrop-filter:saturate(140%) blur(14px);
    background:linear-gradient(180deg, rgba(10,15,28,.92), rgba(10,15,28,.66));
    border-bottom:1px solid var(--line-soft);
  }
  .nav-in{display:flex;align-items:center;gap:20px;height:70px}
  .nav-logo{display:flex;align-items:center;gap:10px;flex:0 0 auto}
  .nav-logo img{height:30px;width:auto;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))}
  .nav-logo .wm{font-family:'Bebas Neue';font-size:26px;letter-spacing:.06em;color:var(--ivory);line-height:1}
  .nav-links{display:flex;gap:26px;margin-left:auto;align-items:center}
  .nav-links a{
    font-family:'Barlow Semi Condensed';font-weight:600;font-size:13.5px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ivory-dim);transition:color .25s var(--ease);position:relative;padding:4px 0;
  }
  .nav-links a:hover{color:var(--ivory)}
  .nav-links a::after{content:"";position:absolute;left:0;bottom:-2px;height:1px;width:0;background:var(--gold);transition:width .3s var(--ease)}
  .nav-links a:hover::after{width:100%}
  .lang-btn{
    font-family:'Barlow Semi Condensed';font-weight:700;font-size:12.5px;letter-spacing:.16em;
    border:1px solid var(--line);color:var(--gold);background:transparent;border-radius:999px;
    padding:7px 14px;cursor:pointer;transition:all .25s var(--ease);text-transform:uppercase;
  }
  .lang-btn:hover{background:var(--gold);color:var(--navy);border-color:var(--gold)}
  .btn{
    font-family:'Barlow Semi Condensed';font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    cursor:pointer;border:0;transition:all .28s var(--ease);font-size:14px;
  }
  .btn-gold{background:linear-gradient(135deg,var(--gold-bright),var(--gold));color:#221708;
    padding:13px 26px;border-radius:8px;box-shadow:0 8px 24px -8px rgba(184,144,80,.6)}
  .btn-gold:hover{transform:translateY(-2px);box-shadow:0 14px 32px -8px rgba(184,144,80,.75)}
  .btn-ghost{background:transparent;color:var(--ivory);border:1px solid var(--line);padding:13px 26px;border-radius:8px}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
  .nav .btn-gold{padding:10px 20px;font-size:13px}
  .nav-burger{display:none}

  /* ---------- HERO ---------- */
  header.hero{position:relative;padding:clamp(40px,7vw,90px) 0 clamp(60px,8vw,110px);overflow:hidden}
  .hero-frame{position:relative;border:1px solid var(--line);border-radius:18px;
    padding:clamp(28px,5vw,64px);background:linear-gradient(180deg, rgba(16,30,51,.5), rgba(10,15,28,.25));overflow:hidden}
  .hero-frame::before{content:"";position:absolute;inset:0;background:
    radial-gradient(600px 300px at 85% -50px, rgba(184,144,80,.14), transparent 60%);pointer-events:none}
  .hero-logo{height:clamp(64px,12vw,120px);width:auto;margin-bottom:26px;
    filter:drop-shadow(0 8px 30px rgba(0,0,0,.5))}
  .hero-meta{display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:30px}
  .hero-coord{font-family:'Barlow Semi Condensed';font-weight:500;font-size:11.5px;letter-spacing:.26em;
    text-transform:uppercase;color:var(--ivory-dim)}
  .display{position:relative}
  .hero-sub{font-family:'Barlow Semi Condensed';font-weight:600;font-size:clamp(15px,2.4vw,21px);
    letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin:6px 0 20px}
  .hero-promise{font-family:'Bebas Neue';font-size:clamp(24px,4.4vw,46px);color:var(--ivory);letter-spacing:.02em;margin-bottom:18px}
  .hero-promise b{color:var(--gold);font-weight:400}
  .hero-body{max-width:54ch;color:var(--ivory-dim);font-size:clamp(15px,2vw,18px);margin-bottom:34px}
  .hero-cta{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .scrollcue{margin-top:40px;display:inline-flex;align-items:center;gap:10px;color:var(--ivory-dim);
    font-family:'Barlow Semi Condensed';font-weight:600;letter-spacing:.2em;text-transform:uppercase;font-size:11px}
  .scrollcue span{display:inline-block;width:1px;height:34px;background:linear-gradient(var(--gold),transparent);animation:cue 2s var(--ease) infinite}
  @keyframes cue{0%,100%{opacity:.3;transform:scaleY(.6)}50%{opacity:1;transform:scaleY(1)}}

  /* ---------- SECTION ---------- */
  section{padding:clamp(56px,9vw,120px) 0;position:relative}
  .sec-head{margin-bottom:clamp(34px,5vw,56px);max-width:760px}
  .sec-head .h2{margin:16px 0 14px}
  .reveal{opacity:1;transform:none;transition:opacity .7s var(--ease),transform .7s var(--ease)}
  .has-js .reveal{opacity:0;transform:translateY(26px)}
  .has-js .reveal.in{opacity:1;transform:none}

  /* ---------- STATS STRIP ---------- */
  .stats{border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);
    background:linear-gradient(180deg,rgba(16,30,51,.35),transparent)}
  .stats-in{padding:clamp(30px,5vw,48px) 0}
  .stats-label{margin-bottom:26px}
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
  .stat{padding:18px 0}
  .stat .num{font-family:'Bebas Neue';font-size:clamp(46px,7vw,84px);color:var(--gold);line-height:.9;letter-spacing:.01em}
  .stat .lab{font-family:'Barlow Semi Condensed';font-weight:600;font-size:12.5px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--ivory-dim);margin-top:8px}

  /* ---------- MANIFESTO ---------- */
  .mani-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:clamp(30px,6vw,80px);align-items:start}
  .mani-points{display:flex;flex-direction:column;gap:22px}
  .mpoint{display:flex;gap:18px;padding:20px;border:1px solid var(--line-soft);border-radius:12px;
    background:linear-gradient(180deg,rgba(16,30,51,.4),transparent);transition:border-color .3s var(--ease),transform .3s var(--ease)}
  .mpoint:hover{border-color:var(--line);transform:translateX(4px)}
  .mpoint .mn{font-family:'Bebas Neue';font-size:34px;color:var(--gold);line-height:1;opacity:.85;flex:0 0 auto;width:42px}
  .mpoint .mt{font-family:'Bebas Neue';font-size:24px;letter-spacing:.03em;margin-bottom:4px}
  .mpoint .md{color:var(--ivory-dim);font-size:15px}

  /* ---------- LEVELS ---------- */
  .level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  .lcard{position:relative;border:1px solid var(--line-soft);border-radius:16px;padding:30px 26px 26px;
    background:linear-gradient(180deg,rgba(16,30,51,.55),rgba(10,15,28,.3));cursor:pointer;
    transition:border-color .3s var(--ease),transform .3s var(--ease),box-shadow .3s var(--ease);overflow:hidden}
  .lcard::after{content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;
    box-shadow:inset 0 0 0 0 var(--gold);transition:box-shadow .3s var(--ease)}
  .lcard:hover{transform:translateY(-4px);border-color:var(--line)}
  .lcard.active{border-color:var(--gold)}
  .lcard.active::after{box-shadow:inset 0 0 0 1px var(--gold)}
  .lcard .ltag{font-family:'Barlow Semi Condensed';font-weight:700;font-size:11px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--gold);margin-bottom:18px;display:block;min-height:14px}
  .lcard .lname{font-family:'Bebas Neue';font-size:clamp(40px,5vw,56px);letter-spacing:.02em;line-height:.9}
  .lcard .lsub{font-family:'Barlow Semi Condensed';font-weight:600;font-size:14px;letter-spacing:.06em;
    color:var(--ivory);margin:10px 0 16px;text-transform:uppercase}
  .lcard .ldesc{color:var(--ivory-dim);font-size:15px;margin-bottom:8px}
  .lcard .lfor{color:var(--ivory-dim);font-size:13px;opacity:.8;font-style:italic;margin-bottom:22px}
  .lcard .lpick{display:flex;align-items:center;gap:10px;font-family:'Barlow Semi Condensed';
    font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:13px;color:var(--gold)}
  .lcard .lpick .dot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--gold);position:relative;transition:all .25s}
  .lcard.active .lpick .dot{background:var(--gold)}
  .lcard.active .lpick .dot::after{content:"";position:absolute;inset:3.5px;border-radius:50%;background:var(--navy)}
  .lcard.active .lpick .txt::after{content:" ✓"}

  /* ---------- TRACKER ---------- */
  .track-top{display:grid;grid-template-columns:auto 1fr;gap:clamp(24px,5vw,48px);align-items:center;
    margin-bottom:40px;padding:clamp(24px,4vw,36px);border:1px solid var(--line);border-radius:18px;
    background:linear-gradient(180deg,rgba(16,30,51,.5),rgba(10,15,28,.25))}
  .ring-wrap{position:relative;width:150px;height:150px;flex:0 0 auto;justify-self:center}
  .ring-wrap svg{transform:rotate(-90deg)}
  .ring-bg{fill:none;stroke:rgba(237,232,223,.10);stroke-width:10}
  .ring-fg{fill:none;stroke:var(--gold);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .8s var(--ease)}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring-center .pc{font-family:'Bebas Neue';font-size:46px;color:var(--ivory);line-height:1}
  .ring-center .pl{font-family:'Barlow Semi Condensed';font-weight:600;font-size:10.5px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--ivory-dim)}
  .track-meta{display:flex;flex-direction:column;gap:18px}
  .track-stats{display:flex;gap:30px;flex-wrap:wrap}
  .tstat .tn{font-family:'Bebas Neue';font-size:40px;color:var(--gold);line-height:.9}
  .tstat .tl{font-family:'Barlow Semi Condensed';font-weight:600;font-size:11.5px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--ivory-dim);margin-top:4px}
  .focus{border:1px solid var(--line);border-radius:14px;padding:18px 20px;background:rgba(184,144,80,.06);
    display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .focus .fday{font-family:'Bebas Neue';font-size:42px;color:var(--gold);line-height:.85;flex:0 0 auto}
  .focus .ftxt{flex:1 1 220px;min-width:0}
  .focus .ftxt .ft{font-family:'Barlow Semi Condensed';font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;font-size:12px;color:var(--ivory-dim)}
  .focus .ftxt .fd{font-size:14.5px;color:var(--ivory);margin-top:3px;line-height:1.45}
  .focus .btn{flex:0 0 auto}
  .focus.alldone{background:linear-gradient(135deg,rgba(184,144,80,.18),rgba(184,144,80,.05));border-color:var(--gold)}
  .focus.alldone .fday{font-size:28px}

  .grid-tools{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin-bottom:20px}
  .legend{display:flex;gap:18px;flex-wrap:wrap;font-family:'Barlow Semi Condensed';font-weight:600;
    font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ivory-dim)}
  .legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:6px;vertical-align:-1px}
  .lg-done{background:var(--gold)}
  .lg-todo{background:transparent;border:1px solid var(--line)}
  .lg-mile{background:transparent;border:1px solid var(--gold);box-shadow:inset 0 0 0 2px rgba(184,144,80,.4)}
  .reset-btn{font-family:'Barlow Semi Condensed';font-weight:600;font-size:12px;letter-spacing:.12em;
    text-transform:uppercase;background:none;border:0;color:var(--ivory-dim);cursor:pointer;
    border-bottom:1px solid var(--line-soft);padding-bottom:2px;transition:color .25s}
  .reset-btn:hover{color:var(--gold)}
  .day-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:10px}
  .tile{aspect-ratio:1;border:1px solid var(--line-soft);border-radius:10px;background:rgba(16,30,51,.4);
    display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;
    transition:all .2s var(--ease);font-family:'Bebas Neue'}
  .tile:hover{border-color:var(--gold);transform:translateY(-2px)}
  .tile .dn{font-size:26px;color:var(--ivory);line-height:1}
  .tile .dl{font-family:'Barlow Semi Condensed';font-weight:600;font-size:8px;letter-spacing:.1em;
    color:var(--ivory-dim);text-transform:uppercase;margin-top:1px}
  .tile.done{background:linear-gradient(135deg,var(--gold-bright),var(--gold));border-color:var(--gold)}
  .tile.done .dn{color:#221708}
  .tile.done .dl{color:#3a2a10}
  .tile.done::before{content:"✓";position:absolute;top:5px;right:7px;font-family:Barlow;font-weight:800;font-size:11px;color:#221708}
  .tile.mile{box-shadow:inset 0 0 0 2px rgba(184,144,80,.45)}
  .tile.hell{box-shadow:inset 0 0 0 2px var(--gold)}
  .tile .badge{position:absolute;top:-7px;left:50%;transform:translateX(-50%);font-family:'Barlow Semi Condensed';
    font-weight:700;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);
    background:var(--gold);padding:2px 6px;border-radius:4px;white-space:nowrap}
  .tile.next{border-color:var(--gold);animation:pulse 2.4s var(--ease) infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(184,144,80,.0)}50%{box-shadow:0 0 0 4px rgba(184,144,80,.18)}}

  /* ---------- SCHEDULE TABLE ---------- */
  .sched-tools{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:22px}
  .table-scroll{overflow-x:auto;border:1px solid var(--line-soft);border-radius:14px}
  table{width:100%;border-collapse:collapse;min-width:560px}
  thead th{font-family:'Barlow Semi Condensed';font-weight:700;font-size:11.5px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--gold);text-align:center;padding:15px 10px;
    background:rgba(10,15,28,.6);border-bottom:1px solid var(--line);position:sticky;top:0}
  thead th:first-child{text-align:left;padding-left:20px}
  tbody td{padding:11px 10px;text-align:center;font-size:14.5px;color:var(--ivory);
    border-bottom:1px solid var(--line-soft);font-variant-numeric:tabular-nums}
  tbody td:first-child{text-align:left;padding-left:20px;font-family:'Bebas Neue';font-size:20px;color:var(--gold)}
  tbody tr:hover{background:rgba(184,144,80,.05)}
  tbody tr.r-mile{background:rgba(184,144,80,.08)}
  tbody tr.r-hell{background:rgba(184,144,80,.13)}
  td .tag{font-family:'Barlow Semi Condensed';font-weight:700;font-size:9.5px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--navy);background:var(--gold);padding:2px 7px;border-radius:4px;margin-left:8px;vertical-align:2px}
  .muted{color:var(--ivory-dim);opacity:.5}

  /* ---------- RULES ---------- */
  .rules-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .rule{padding:26px 24px;border:1px solid var(--line-soft);border-radius:14px;
    background:linear-gradient(180deg,rgba(16,30,51,.4),transparent);position:relative}
  .rule .ri{font-family:'Bebas Neue';font-size:18px;color:var(--navy);background:var(--gold);
    width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
  .rule .rt{font-family:'Bebas Neue';font-size:23px;letter-spacing:.02em;margin-bottom:6px}
  .rule .rd{color:var(--ivory-dim);font-size:14.5px}

  /* ---------- EMAIL ---------- */
  .email-band{border:1px solid var(--line);border-radius:20px;padding:clamp(34px,6vw,64px);
    background:
      radial-gradient(500px 250px at 80% 0%, rgba(184,144,80,.14), transparent 60%),
      linear-gradient(180deg,rgba(16,30,51,.6),rgba(10,15,28,.3));text-align:center;position:relative;overflow:hidden}
  .email-band .h2{margin:14px 0 14px}
  .email-band .lede{margin:0 auto 30px}
  .eform{display:flex;gap:12px;max-width:520px;margin:0 auto;flex-wrap:wrap}
  .eform input{flex:1 1 240px;background:rgba(10,15,28,.7);border:1px solid var(--line);border-radius:9px;
    padding:15px 18px;color:var(--ivory);font-family:'Barlow';font-size:15.5px;outline:none;transition:border-color .25s}
  .eform input:focus{border-color:var(--gold)}
  .eform input::placeholder{color:var(--ivory-dim)}
  .eform .btn-gold{flex:0 0 auto}
  .eprivacy{margin-top:16px;font-size:12.5px;color:var(--ivory-dim);letter-spacing:.04em}
  .esuccess{font-family:'Bebas Neue';font-size:30px;color:var(--gold);letter-spacing:.02em}

  /* ---------- FAQ ---------- */
  .faq-list{max-width:820px;border-top:1px solid var(--line-soft)}
  .qitem{border-bottom:1px solid var(--line-soft)}
  .qhead{width:100%;background:none;border:0;cursor:pointer;display:flex;justify-content:space-between;
    align-items:center;gap:20px;padding:24px 4px;text-align:left;color:var(--ivory);
    font-family:'Bebas Neue';font-size:clamp(20px,2.6vw,26px);letter-spacing:.02em;transition:color .25s}
  .qhead:hover{color:var(--gold)}
  .qhead .qi{flex:0 0 auto;width:26px;height:26px;position:relative;transition:transform .3s var(--ease)}
  .qhead .qi::before,.qhead .qi::after{content:"";position:absolute;background:var(--gold);transition:opacity .3s}
  .qhead .qi::before{top:12px;left:3px;right:3px;height:2px}
  .qhead .qi::after{left:12px;top:3px;bottom:3px;width:2px}
  .qitem.open .qi::after{opacity:0}
  .qbody{max-height:0;overflow:hidden;transition:max-height .4s var(--ease)}
  .qbody p{padding:0 4px 24px;color:var(--ivory-dim);font-size:15.5px;max-width:70ch}

  /* ---------- FOOTER ---------- */
  footer{border-top:1px solid var(--line-soft);padding:clamp(40px,6vw,70px) 0 40px;
    background:linear-gradient(180deg,transparent,rgba(10,11,13,.5))}
  .foot-in{display:flex;justify-content:space-between;align-items:flex-start;gap:30px;flex-wrap:wrap}
  .foot-logo img{height:46px;margin-bottom:14px}
  .foot-tag{font-family:'Barlow Semi Condensed';font-weight:600;letter-spacing:.24em;text-transform:uppercase;
    font-size:12px;color:var(--gold)}
  .foot-right{text-align:right;display:flex;flex-direction:column;gap:10px;align-items:flex-end}
  .foot-link{font-family:'Barlow Semi Condensed';font-weight:600;letter-spacing:.1em;text-transform:uppercase;
    font-size:13px;color:var(--ivory-dim);cursor:pointer;background:none;border:0;border-bottom:1px solid var(--line);padding-bottom:2px;transition:color .25s}
  .foot-link:hover{color:var(--gold)}
  .foot-rights{font-size:12.5px;color:var(--ivory-dim);opacity:.7}
  .foot-built{font-size:11.5px;color:var(--ivory-dim);opacity:.5;letter-spacing:.06em}

  /* ---------- MODAL ---------- */
  .modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
  .modal.open{display:flex}
  .modal-bg{position:absolute;inset:0;background:rgba(5,8,15,.78);backdrop-filter:blur(6px)}
  .modal-card{position:relative;width:min(440px,100%);border:1px solid var(--line);border-radius:18px;
    background:linear-gradient(180deg,#101E33,#0A0F1C);padding:32px 30px;
    animation:pop .3s var(--ease)}
  @keyframes pop{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
  .modal-close{position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:8px;border:1px solid var(--line-soft);
    background:none;color:var(--ivory-dim);cursor:pointer;font-size:18px;transition:all .25s}
  .modal-close:hover{border-color:var(--gold);color:var(--gold)}
  .modal-day{font-family:'Bebas Neue';font-size:64px;color:var(--gold);line-height:.85}
  .modal-tag{font-family:'Barlow Semi Condensed';font-weight:700;font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--gold);display:inline-block;margin-bottom:6px;min-height:13px}
  .modal-ex{list-style:none;margin:22px 0 26px;display:flex;flex-direction:column;gap:1px}
  .modal-ex li{display:flex;justify-content:space-between;padding:12px 4px;border-bottom:1px solid var(--line-soft);
    font-size:15.5px}
  .modal-ex li .k{color:var(--ivory-dim);font-family:'Barlow Semi Condensed';font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-size:13px}
  .modal-ex li .v{color:var(--ivory);font-family:'Bebas Neue';font-size:22px}
  .modal-card .btn{width:100%;padding:15px;border-radius:9px}
  .btn-done{background:linear-gradient(135deg,var(--gold-bright),var(--gold));color:#221708}
  .btn-undo{background:transparent;border:1px solid var(--line);color:var(--ivory)}
  .btn-undo:hover{border-color:var(--gold);color:var(--gold)}

  /* ---------- RESPONSIVE ---------- */
  @media (max-width:980px){
    .mani-grid{grid-template-columns:1fr}
    .level-grid{grid-template-columns:1fr}
    .rules-grid{grid-template-columns:1fr}
    .day-grid{grid-template-columns:repeat(6,1fr)}
    .nav-links{display:none}
    .nav-links.show{display:flex;position:absolute;top:70px;left:0;right:0;flex-direction:column;gap:0;
      background:rgba(10,15,28,.98);border-bottom:1px solid var(--line);padding:8px 24px 18px}
    .nav-links.show a{padding:13px 0;border-bottom:1px solid var(--line-soft)}
    .nav-burger{display:flex;flex-direction:column;gap:5px;background:none;border:0;cursor:pointer;padding:8px;margin-left:auto}
    .nav-burger span{width:24px;height:2px;background:var(--gold);transition:.3s}
    .nav .actions{margin-left:0}
  }
  @media (max-width:680px){
    .track-top{grid-template-columns:1fr;text-align:center}
    .track-stats{justify-content:center}
    .stat-grid{grid-template-columns:repeat(2,1fr);gap:8px}
    .foot-in{flex-direction:column}
    .foot-right{text-align:left;align-items:flex-start}
  }
  @media (max-width:440px){
    .day-grid{grid-template-columns:repeat(5,1fr);gap:8px}
    .hero-cta{flex-direction:column;align-items:stretch}
    .hero-cta .btn{text-align:center}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;scroll-behavior:auto!important}
    .reveal{opacity:1;transform:none}
  }
  @media print{
    nav,.hero-cta,.scrollcue,.track-top,.grid-tools,.day-grid,.email-band,.faq-list,footer,.sched-tools .btn,.nav-burger{display:none!important}
    body{background:#fff;color:#000}
    table,td,th{color:#000!important}
  }
</style>
</head>
<body>
<div id="app"></div>

<!-- day-detail modal -->
<div class="modal" id="modal" aria-hidden="true">
  <div class="modal-bg" data-close></div>
  <div class="modal-card" role="dialog" aria-modal="true">
    <button class="modal-close" data-close aria-label="Close">✕</button>
    <div class="modal-tag" id="mTag"></div>
    <div class="modal-day" id="mDay"></div>
    <ul class="modal-ex" id="mEx"></ul>
    <button class="btn" id="mBtn"></button>
  </div>
</div>

const STORE_KEY='gorreWar30';
const store={
  read(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)||'null')||{}; }catch(e){ return window.__mem||{}; } },
  write(o){ window.__mem=o; try{ localStorage.setItem(STORE_KEY,JSON.stringify(o)); }catch(e){} }
};
function progressArr(lvl){
  const s=store.read(); if(!s.progress) s.progress={};
  if(!s.progress[lvl]) s.progress[lvl]=Array(30).fill(false);
  return s.progress[lvl];
}
function setDay(lvl,dayIdx,val){
  const s=store.read(); if(!s.progress) s.progress={};
  if(!s.progress[lvl]) s.progress[lvl]=Array(30).fill(false);
  s.progress[lvl][dayIdx]=val; store.write(s);
}

}

function renderLevelCards(){
  const t=T[current];
  const grid=$('#levelGrid');
  grid.innerHTML=Object.keys(t.levels.cards).map(k=>{
    const c=t.levels.cards[k];
    return `<div class="lcard ${k===level?'active':''}" data-level="${k}">
      <span class="ltag">${c.tag}</span>
      <div class="lname">${c.name}</div>
      <div class="lsub">${c.sub}</div>
      <div class="ldesc">${c.desc}</div>
      <div class="lfor">${c.forr}</div>
      <div class="lpick"><span class="dot"></span><span class="txt">${k===level?t.levels.selected:t.levels.pick}</span></div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.lcard').forEach(card=>{
    card.addEventListener('click',()=>{ level=card.dataset.level; renderLevelCards(); renderLevelDependent(); 
      document.getElementById('tracker').scrollIntoView({behavior:'smooth'}); });
  });
}

function renderLevelDependent(){
  const t=T[current], meta=LEVELMETA[level], rows=DATA[level], arr=progressArr(level);
  const done=arr.filter(Boolean).length;
  const pct=Math.round(done/30*100);
  // streak from day 1
  let streak=0; for(let i=0;i<30;i++){ if(arr[i]) streak++; else break; }
  const nextIdx=arr.indexOf(false); // -1 if all done
  const C=2*Math.PI*64;
  const off=C*(1-done/30);

  // focus card
  let focusHTML;
  if(nextIdx===-1){
    focusHTML=`<div class="focus alldone"><div class="fday">★</div><div class="ftxt"><div class="ft">${t.track.doneTitle}</div><div class="fd">${t.track.doneBody}</div></div></div>`;
  } else {
    const r=rows[nextIdx];
    const parts=[];
    parts.push(`${r[IDX.run]} ${t.sched.km} ${t.sched.cols.run.toLowerCase()}`);
    parts.push(`${r[IDX.push]} ${t.sched.cols.push.toLowerCase()}`);
    parts.push(`${r[IDX.squat]} ${t.sched.cols.squat.toLowerCase()}`);
    parts.push(`${r[IDX.situp]} ${t.sched.cols.situp.toLowerCase()}`);
    parts.push(`${r[IDX.plank]}${t.sched.sec} ${t.sched.cols.plank.toLowerCase()}`);
    if(meta.hasPull && r[IDX.pull]>0) parts.push(`${r[IDX.pull]} ${t.sched.cols.pull.toLowerCase()}`);
    if(r[IDX.burp]>0) parts.push(`${r[IDX.burp]} ${t.sched.cols.burp.toLowerCase()}`);
    focusHTML=`<div class="focus"><div class="fday">${r[IDX.day]}</div>
      <div class="ftxt"><div class="ft">${t.track.focusLabel}</div><div class="fd">${parts.join(' · ')}</div></div>
      <button class="btn btn-gold" data-mark="${nextIdx}">${t.track.markDone}</button></div>`;
  }

  $('#trackerBody').innerHTML=`
    <div class="track-top">
      <div class="ring-wrap">
        <svg width="150" height="150" viewBox="0 0 150 150">
          <circle class="ring-bg" cx="75" cy="75" r="64"></circle>
          <circle class="ring-fg" cx="75" cy="75" r="64" stroke-dasharray="${C}" stroke-dashoffset="${off}"></circle>
        </svg>
        <div class="ring-center"><div class="pc">${pct}%</div><div class="pl">${t.track.complete}</div></div>
      </div>
      <div class="track-meta">
        <div class="track-stats">
          <div class="tstat"><div class="tn">${done}<span style="font-size:22px;opacity:.5">/30</span></div><div class="tl">${t.track.dayDone}</div></div>
          <div class="tstat"><div class="tn">${streak}</div><div class="tl">${t.track.streakLabel}</div></div>
        </div>
        ${focusHTML}
      </div>
    </div>
    <div class="grid-tools">
      <div class="legend">
        <span><i class="lg-done"></i>${t.track.legendDone}</span>
        <span><i class="lg-todo"></i>${t.track.legendTodo}</span>
        <span><i class="lg-mile"></i>${t.track.legendSpecial}</span>
      </div>
      <button class="reset-btn" id="resetBtn">${t.track.reset}</button>
    </div>
    <div class="day-grid" id="dayGrid">
      ${rows.map((r,i)=>{
        const m=r[IDX.marker];
        const cls=[ 'tile', arr[i]?'done':'', m===1?'mile':'', m===2?'hell':'', (i===nextIdx)?'next':'' ].join(' ');
        const badge = m===1?`<span class="badge">${t.track.mile}</span>` : m===2?`<span class="badge">${t.track.hell}</span>`:'';
        return `<div class="${cls}" data-day="${i}">${badge}<span class="dn">${r[IDX.day]}</span></div>`;
      }).join('')}
    </div>`;

  // schedule table
  $('#schedLevelTag').textContent=t.levels.cards[level].name+' · '+t.levels.cards[level].tag;
  const cols=meta.cols;
  $('#schedWrap').innerHTML=`<table><thead><tr>${cols.map(c=>`<th>${t.sched.cols[c]}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>{
      const m=r[IDX.marker];
      const rc=m===1?'r-mile':m===2?'r-hell':'';
      const tag=m===1?`<span class="tag">${t.track.mile}</span>`:m===2?`<span class="tag">${t.track.hell}</span>`:'';
      return `<tr class="${rc}">${cols.map(c=>{
        if(c==='day') return `<td>${r[IDX.day]}${tag}</td>`;
        return `<td>${fmtVal(c,r,t)}</td>`;
      }).join('')}</tr>`;
    }).join('')}</tbody></table>`;

  // wire tile + mark interactions
  $('#dayGrid').querySelectorAll('.tile').forEach(tile=>{
    tile.addEventListener('click',()=>openModal(parseInt(tile.dataset.day)));
  });
  const markBtn=$('#trackerBody').querySelector('[data-mark]');
  if(markBtn) markBtn.addEventListener('click',()=>{ setDay(level,parseInt(markBtn.dataset.mark),true); renderLevelDependent(); });
  const resetBtn=$('#resetBtn');
  if(resetBtn) resetBtn.addEventListener('click',()=>{
    if(confirm(t.track.resetConfirm)){ setProgressReset(level); renderLevelDependent(); }
  });
}
function setProgressReset(lvl){ const s=store.read(); if(!s.progress) s.progress={}; s.progress[lvl]=Array(30).fill(false); store.write(s); }

/* ===== MODAL ===== */
let modalDay=null;
function openModal(dayIdx){
  const t=T[current], meta=LEVELMETA[level], r=DATA[level][dayIdx], arr=progressArr(level);
  modalDay=dayIdx;
  const m=r[IDX.marker];
  $('#mTag').textContent = m===1?t.track.mile : m===2?t.track.hell : t.nav.protocol+' · '+t.levels.cards[level].name;
  $('#mDay').textContent = t.sched.cols.day+' '+r[IDX.day];
  const ex=[
    [t.sched.cols.run, r[IDX.run]+' '+t.sched.km],
    [t.sched.cols.push, r[IDX.push]],
    [t.sched.cols.squat, r[IDX.squat]],
    [t.sched.cols.situp, r[IDX.situp]],
    [t.sched.cols.plank, r[IDX.plank]+t.sched.sec]
  ];
  if(meta.hasPull && r[IDX.pull]>0) ex.push([t.sched.cols.pull, r[IDX.pull]]);
  if(r[IDX.burp]>0) ex.push([t.sched.cols.burp, r[IDX.burp]]);
  $('#mEx').innerHTML=ex.map(e=>`<li><span class="k">${e[0]}</span><span class="v">${e[1]}</span></li>`).join('');
  const isDone=arr[dayIdx];
  const btn=$('#mBtn');
  btn.textContent=isDone?t.track.undo:t.track.markDone;
  btn.className='btn '+(isDone?'btn-undo':'btn-done');
  btn.onclick=()=>{ setDay(level,dayIdx,!arr[dayIdx]); closeModal(); renderLevelDependent(); };
  $('#modal').classList.add('open'); $('#modal').setAttribute('aria-hidden','false');
}
function closeModal(){ $('#modal').classList.remove('open'); $('#modal').setAttribute('aria-hidden','true'); }

/* ===== WIRE GLOBAL ===== */
function wire(){
  $('#langBtn').addEventListener('click',toggleLang);
  $('#footLang').addEventListener('click',toggleLang);
  $('#burger').addEventListener('click',()=>$('#navLinks').classList.toggle('show'));
  $('#navLinks').querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>$('#navLinks').classList.remove('show')));
  $('#printBtn').addEventListener('click',()=>window.print());
  // FAQ
  $('#faq').querySelectorAll('.qhead').forEach(h=>{
    h.addEventListener('click',()=>{
      const item=h.closest('.qitem'); const body=item.querySelector('.qbody');
      const open=item.classList.contains('open');
      if(open){ item.classList.remove('open'); body.style.maxHeight=0; }
      else { item.classList.add('open'); body.style.maxHeight=body.scrollHeight+'px'; }
    });
  });
  // email
  const eb=$('#emailBtn');
  eb.addEventListener('click',submitEmail);
  $('#emailInput').addEventListener('keydown',e=>{ if(e.key==='Enter') submitEmail(); });
  // modal close
  $('#modal').querySelectorAll('[data-close]').forEach(x=>x.addEventListener('click',closeModal));
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
  // prefill email if stored
  const s=store.read(); if(s.email){ showEmailSuccess(); }
}
function toggleLang(){ current = current==='nl'?'en':'nl'; render(); }

function submitEmail(){
  const t=T[current], input=$('#emailInput'); const val=(input.value||'').trim();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(val)){ input.style.borderColor='#c0563f'; input.focus(); return; }
  /* ===== LEAD CAPTURE =====
     To send these emails to Klaviyo/Mailchimp later, replace the block below with a fetch()
     POST to your form endpoint, e.g. a Klaviyo list subscribe URL. For now it stores locally. */
  const s=store.read(); s.email=val; store.write(s);
  showEmailSuccess();
}
function showEmailSuccess(){
  const t=T[current];
  $('#emailZone').innerHTML=`<div class="esuccess">✓ ${t.email.success}</div><div class="eprivacy" style="margin-top:10px">@buildwithgorre</div>`;
}

/* ===== REVEAL + COUNTERS ===== */
function setupReveal(){
  const els=document.querySelectorAll('.reveal');
  const revealAll=()=>els.forEach(e=>e.classList.add('in'));
  if(!('IntersectionObserver' in window)){ revealAll(); return; }
  const io=new IntersectionObserver((ents)=>{ ents.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target);} }); },{threshold:.12, rootMargin:'0px 0px -6% 0px'});
  els.forEach(e=>{
    const r=e.getBoundingClientRect();
    if(r.top < window.innerHeight*0.95){ e.classList.add('in'); }
    else io.observe(e);
  });
  setTimeout(revealAll, 2500); // safety: never leave content hidden
}
function setupCounters(){
  // totals from elite
  const e=DATA.elite;
  const sum=k=>e.reduce((a,r)=>a+r[IDX[k]],0);
  const targets=[Math.round(sum('run')),sum('push'),sum('situp'),Math.round(sum('plank')/60)];
  const nums=$('#statGrid').querySelectorAll('.num');
  nums.forEach((n,i)=>n.dataset.target=targets[i]);
  const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(reduce){ nums.forEach((n,i)=>n.textContent=targets[i].toLocaleString()); return; }
  let started=false;
  const grid=$('#statGrid');
  const run=()=>{ if(started) return; started=true;
    nums.forEach((n)=>{
      const target=+n.dataset.target; const dur=1300; const t0=performance.now();
      const step=(now)=>{ const p=Math.min(1,(now-t0)/dur); const e2=1-Math.pow(1-p,3);
        n.textContent=Math.round(target*e2).toLocaleString(); if(p<1) requestAnimationFrame(step); };
      requestAnimationFrame(step);
    });
  };
  if('IntersectionObserver' in window){
    const io=new IntersectionObserver(es=>{es.forEach(x=>{if(x.isIntersecting){run();io.disconnect();}})},{threshold:.4});
    io.observe(grid);
  } else run();
}

/* ===== BOOT ===== */
document.documentElement.classList.add('has-js');
render();
</script>
